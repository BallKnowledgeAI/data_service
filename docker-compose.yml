# docker-compose.yml — Tactical Analysis Pipeline: local demo stack
#
# Usage:
#   docker compose up -d          # start in background
#   docker compose down           # stop (keeps volumes)
#   docker compose down -v        # stop + wipe volumes (fresh start)
#
# Requires a .env file in the same directory (copy from .env.example).

services:

  postgres:
    image: postgres:16-alpine
    container_name: tactical_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: tactical_redis
    restart: unless-stopped
    # Conditionally enable password auth only when REDIS_PASSWORD is set.
    # When the variable is empty the command falls back to a plain server
    # with no auth requirement (safe for local-only dev).
    command: >
      sh -c '
        if [ -n "$$REDIS_PASSWORD" ]; then
          redis-server --requirepass "$$REDIS_PASSWORD"
        else
          redis-server
        fi
      '
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: >
        sh -c '
          if [ -n "$$REDIS_PASSWORD" ]; then
            redis-cli -a "$$REDIS_PASSWORD" ping
          else
            redis-cli ping
          fi
        '
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
